<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P STREAMER PRO</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-box" id="login-box">
        <h2>P2P CONNECT</h2>
        <input type="text" id="room-code" maxlength="4" placeholder="0000" autocomplete="off"><br>
        <button class="connect-btn" onclick="window.joinStream()">Подключиться</button>
        <div id="status">Ожидание...</div>
    </div>

    <div id="player-container">
        <div id="play-overlay" onclick="window.forcePlay()">
            <h1>▶ Нажмите на экран</h1>
            <p>Браузер заблокировал видео после F5. Нажмите для запуска.</p>
        </div>

        <div id="remote-cursor"></div>
        <video id="video-player" playsinline tabindex="0"></video>
        <div class="hud-panel">
            <div class="stat-box"><div class="ping-dot" id="ping-dot"></div> <span id="ping-text">-- ms</span></div>
            <button class="icon-btn" id="btn-gamemode" onclick="window.toggleGameMode()" title="Игровой режим (Для 3D игр)">🎮</button>
            <button class="icon-btn" onclick="window.toggleFullscreen()" title="Полный экран">⛶</button>
            <button class="icon-btn" onclick="window.showMobileKeyboard()" title="Клавиатура (для телефонов)">⌨️</button>
            <button class="icon-btn" onclick="window.sendEsc()" title="Escape">ESC</button>
        </div>
        <input type="text" id="mobile-keyboard-input" autocomplete="off">
    </div>

    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
